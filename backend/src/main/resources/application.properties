spring.application.name=banking-system-core

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/banking}
spring.datasource.username=${DB_USERNAME:banking_user}
spring.datasource.password=${DB_PASSWORD:banking_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
server.port=8080